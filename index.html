<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <title>100万ドルの夜景メーカー</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div id="app">
    <main id="stage">
      <canvas id="night-canvas" width="1280" height="800"></canvas>
      <div id="status"></div>
    </main>
    <footer id="controls">
      <button id="controls-toggle" aria-label="パラメータの表示切り替え" aria-expanded="true">
        <span class="toggle-arrow">▾</span>
        <span class="toggle-label">Close</span>
      </button>
      <div id="controls-body">
        <div class="row">
          <label>Shape
            <select id="shape">
              <option value="hakodate">Hakodate (砂州)</option>
              <option value="peninsula">Peninsula (半島)</option>
              <option value="island">Island (島)</option>
              <option value="bay">Bay (湾)</option>
              <option value="straight">Straight (直線)</option>
            </select>
          </label>
          <label>Sky
            <select id="sky">
              <option value="sunset">Sunset (夕焼け)</option>
              <option value="night">Night (夜)</option>
              <option value="dawn">Dawn (夜明け)</option>
            </select>
          </label>
          <label>Waist <input type="range" id="waist" min="1" max="10" value="6"></label>
          <label>Density <input type="range" id="density" min="1" max="20" value="12"></label>
          <label>Chaos <input type="range" id="chaos" min="0" max="100" value="15"></label>
        </div>
        <div class="row">
          <label>Asymmetry <input type="range" id="asymmetry" min="0" max="100" value="25"></label>
          <label>Foreground <input type="range" id="foreground" min="0" max="50" value="20"></label>
          <label>Mountain <input type="range" id="mountain" min="0" max="30" value="14"></label>
          <label>Stars <input type="range" id="stars" min="0" max="100" value="20"></label>
          <label>Star Bright <input type="range" id="star-bright" min="0" max="100" value="50"></label>
          <label>Seed <input type="text" id="seed" placeholder="ex: hakodate / ika / goryokaku"></label>
        </div>
        <div class="row row--visual">
          <label>Saturation <input type="range" id="saturation" min="0" max="200" value="100"></label>
          <label>Brightness <input type="range" id="brightness" min="30" max="150" value="100"></label>
          <label>Hue Shift <input type="range" id="hue" min="0" max="360" value="0"></label>
          <label>Contrast <input type="range" id="contrast" min="50" max="200" value="100"></label>
          <label class="color-label">BG Color <input type="color" id="bg-color" value="#000000"></label>
          <button id="generate" disabled>Loading...</button>
        </div>
      </div>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
